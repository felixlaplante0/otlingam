name: Lint

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    container:
      image: python:3.13
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install ruff
        run: pip install ruff
      - name: Format check
        run: ruff format --check otlingam
      - name: Lint
        run: ruff check otlingam
